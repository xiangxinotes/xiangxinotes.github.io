product:
  name: "好物推荐"
  title: "长期实用好物推荐：高性价比生活与旅居好物清单"
  desc: "拒绝跟风！「向西笔记」好物推荐合集，精选作者本人真实买过、长期复购的实用生活好物与旅居装备。涵盖平价零食、数码配件、日常衣物及精神食粮，部分支持新疆包邮。纯真人实用测评，带你避坑省钱，只买对的不买贵的！"

workplace:
  name: "职场成长"
  title: "职场新人指南：从面试技巧到高效工作建议"
  desc: "职场新人如何迅速站稳脚跟？「向西笔记」职场成长合集帮你见招拆招！分享面试高频问题的高分回答模板、外企英语建议，以及工作中犯了错的救火指南。带你提升工作正确率，少走弯路！"

sojourn:
  name: "旅居"
  title: "如何开启旅居？三亚/昆明/大连/儋州旅居租房全攻略"
  desc: "渴望旅居却不知如何开启？「向西笔记」旅居合集为你整合儋州海花岛、三亚、昆明、大连等地的真实旅居租房经验。讲述如何平衡旅居、工作与学习，包含3个月生活必需品清单及避坑指南。手把手带你解决住房难题，轻松开启你的下一站生活！"

early-retirement:
  name: "提早退休"
  title: "提早退休指南：从零开启财务自由与FIRE运动思维"
  desc: "渴望提早退休却缺乏理财知识？「向西笔记」提早退休合集为你深度解析经典理财书籍与富人思维。更有全球FIRE教父Mr. Money Mustache的硬核理念分享，带你重塑金钱观、构筑退休愿景。点击开启你的财务自由觉醒之路！"

book:
  name: "书单"
  title: "个人提升必看书单：搞钱、高效能与人际交往畅销书评"
  desc: "迷茫不知道看什么书？「向西笔记」为你精选硬核畅销书单与深度读后感，专注个人提升！涵盖《小狗钱钱》、《高效能人士的7个习惯》、《人性的弱点》等理财思维、效率管理与人际交往经典。带你吸收名著精髓，实现认知突围！"

driver's-license:
  name: "驾考"
  title: "新疆精河自动挡驾考全攻略：科目一到科目四保姆级通关指南"
  desc: "准备在精河考自动挡驾照？「向西笔记」为你奉上超详细精河驾考全过程记录！从报名花费、车辆基础认识（方向盘/档位拆解），到精河本地科目二、科目三通关指南与注意事项。专为零基础小白打造，看这个合集就够了！"

communication-skills:
  name: "沟通技巧"
  title: "通用沟通技巧与人际交往方法：从经典理论到情商提升话术"
  desc: "想摆脱社交内耗？「向西笔记」通用沟通技巧合集，为你提炼真正能落地的日常交往方法。精选《人性的弱点》实战应用指南、高情商提升播客。这里不讲虚无的套路，只帮你重塑底层沟通思维，让社交更自然自如！"

self-mastery:
  name: "个人管理"
  title: "个人管理与底层认知：从心智突破到习惯重塑的自我进化"
  desc: "拒绝人云亦云！「向西笔记」个人管理合集，为你深度拆解自我进化的底层逻辑。包含向西亲测的有效戒手机、阅读习惯培养、成功日记实操等方法，更有关于“活着的意义、如何变勇敢”的心智硬核思考。帮你打破内耗，重夺人生控制权！"