<!-- <div class="nav__bar container"> -->
<div class="container">
  <div class="row">
    <!-- <div class="contaier__of__header col col-12"> -->
    <div class="col col-12">
      <!-- begin header -->
      <header class="header">

        <div class="logo">
          <a class="logo__link" href="{{site.baseurl}}/">
          {%if site.logo %}
            <img width="900" height="262" class="logo__image" src="{{ site.baseurl }}/images/{{ site.logo }}" alt="向西笔记 - 返回首页">
          {% else %}
            {{ site.title }}
          {% endif %}
          </a>
        </div>

        <nav class="main-nav">

          <div class="main-nav__box">
            <div class="nav-icon__close">
              <!-- <i class="ion ion-ios-close-circle-outline"></i> -->
              <ion-icon name="close-circle-outline"></ion-icon>
            </div>

            <div class="nav__title">菜单</div>

            <ul class="nav__list list-reset">
              <li class="nav__item">
                <a href="{{site.baseurl}}/" class="nav__link">主页</a>
              </li>
              <li class="nav__item">
                <a href="{{site.baseurl}}/tag/product/" class="nav__link">好物推荐</a>
              </li>
              <li class="nav__item">
                <a href="{{site.baseurl}}/tag/early-retirement/" class="nav__link">提早退休</a>
              </li>
              <li class="nav__item">
                <a href="{{site.baseurl}}/tag/sojourn/" class="nav__link">开启旅居</a>
              </li>
              {% for page in site.pages %}
                {% unless page.name == 'tags.html' or page.name == '404.html' %}
              {% if page.title %}
              <li class="nav__item">
                <a href="{{ page.url | prepend: site.baseurl }}" class="nav__link">{{ page.title }}</a>
              </li>
              {% endif %}
                {% endunless %}
              {% endfor %}
            </ul>

          </div>
        </nav>

        <div class="nav-buttons">
          <!-- <i class="nav__icon nav__icon-menu ion ion-md-menu" aria-label="Menu Icon"></i>
          <i class="nav__icon nav__icon-search ion ion-md-search" aria-label="Search Icon"></i> -->
          <ion-icon name="menu-sharp" class="nav__icon nav__icon-menu"></ion-icon>
          <ion-icon name="search-sharp" class="nav__icon nav__icon-search"></ion-icon>
        </div>

        <div class="header__overlay"></div>
      </header>
      <!-- end header -->
    </div>
  </div>
</div>
