<div class="post__share">
  <span class="share__title">分享这篇文章：</span>
  <ul class="share__list list-reset">
    <li class="share__item">
      <a class="share__facebook" href="https://www.facebook.com/sharer/sharer.php?u=https://xiangxi.work{{ page.url }}"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
        title="Share on Facebook" rel="nofollow">
        <ion-icon name="logo-facebook"></ion-icon>
      </a>

    </li>

    <li class="share__item">
      <a class="share__twitter" href="https://twitter.com/intent/tweet?text={{ page.title | uri_escape }}&url=https://xiangxi.work{{ page.url }}"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
        title="Share on Twitter" rel="nofollow">
        <ion-icon name="logo-twitter"></ion-icon>
      </a>
    </li>

    <li class="share__item">
      <a class="share__linkedin" href="https://www.linkedin.com/shareArticle?mini=true&url=https://xiangxi.work{{ page.url }}&title={{ page.title | uri_escape }}&summary={{ page.description | uri_escape }}&source={{ site.title | uri_escape }}"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;" title="Share on LinkedIn" rel="nofollow">
        <ion-icon name="logo-linkedin"></ion-icon>
      </a>
    </li>

    <li class="share__item">
      <!-- <a class="share__pinterest" href="http://pinterest.com/pin/create/button/?url={{ site.url }}{{ site.baseurl }}{{ page.url }}&amp;media={{ site.url }}{{ site.baseurl }}/images/{{ page.image }}&amp;description={{ page.title | uri_escape }}" -->
      <a class="share__pinterest" href="http://pinterest.com/pin/create/button/?url={{ site.url }}{{ site.baseurl }}{{ page.url }}&amp;media=https://xiangxi.work/images/{{ page.image }}&amp;description={{ page.title | uri_escape }}"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=900,height=500,toolbar=1,resizable=0'); return false;" title="Share on Pinterest"
        rel="nofollow">
        <ion-icon name="logo-pinterest"></ion-icon>
      </a>
    </li>

    <li class="share__item">
      <a class="share__weibo" href="https://service.weibo.com/share/share.php?url=https://xiangxi.work{{ page.url }}&title={{ page.title | uri_escape }} 全文地址：https://xiangxi.work{{ page.url }}?shareto=weibo（想看更多？查看向西笔记：https://xiangxi.work）&pic=https://xiangxi.work/images/{{page.image}}&searchPic=false&language=zh_cn"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=900,height=500,toolbar=1,resizable=0'); return false;" title="分享到微博"
        rel="nofollow"><i class="fa-brands fa-weibo"></i></a>
    </li>

    <li class="share__item">
      <a class="share__qzone" href="https://sns.qzone.qq.com/cgi-bin/qzshare/cgi_qzshare_onekey?url=https://xiangxi.work{{ page.url }}?shareto=qzone&title={{ page.title | uri_escape }}&summary={{ page.description | uri_escape }}&desc={{ page.title | uri_escape }} 全文地址：https://xiangxi.work{{ page.url }}?shareto=qzone（想看更多？查看向西笔记：https://xiangxi.work）&pics=https://xiangxi.work/images/{{page.image}}&style=203&width=98&height=22"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=900,height=500,toolbar=1,resizable=0'); return false;" title="分享到QQ空间"
        rel="nofollow"><i class="fa-brands fa-qq"></i></a>
    </li>

      <a class="share__copylink" href="https://xiangxi.work{{ page.url }}?shareto=copylink"
        onclick="navigator.clipboard.writeText(this.href).then(function() { confirm('链接已复制到剪贴板'); });
         return false;" title="复制链接到剪贴板"
        rel="nofollow"><i class="ion ion-ios-copy"></i></a>
    </li> -->
  </ul>
</div>
